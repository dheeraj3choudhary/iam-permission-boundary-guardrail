name: IAM Guardrail - Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

jobs:

  # -------------------------------------------------------
  # JOB 1: VALIDATE
  # Lint CFN templates and run Python unit tests
  # -------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install cfn-lint pytest moto boto3

      - name: Lint CloudFormation templates
        run: |
          cfn-lint cloudformation/core-stack.yml
          cfn-lint cloudformation/app-stack.yml

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  # -------------------------------------------------------
  # JOB 2: DEPLOY
  # Deploy CFN stacks then update Lambda code
  # Only runs on push to main
  # -------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy core stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/core-stack.yml \
            --stack-name iam-guardrail-core-${{ env.ENVIRONMENT }} \
            --parameter-overrides \
                Environment=${{ env.ENVIRONMENT }} \
                TeamsWebhookUrl=${{ secrets.TEAMS_WEBHOOK_URL }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Deploy app stack
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/app-stack.yml \
            --stack-name iam-guardrail-app-${{ env.ENVIRONMENT }} \
            --parameter-overrides Environment=${{ env.ENVIRONMENT }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Package and deploy Lambda code
        run: |
          zip -j lambda.zip lambda/*.py
          aws lambda update-function-code \
            --function-name iam-guardrail-enforcer-${{ env.ENVIRONMENT }} \
            --zip-file fileb://lambda.zip

  # -------------------------------------------------------
  # JOB 3: SMOKE TEST
  # Verify deployment is healthy after deploy
  # -------------------------------------------------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Verify Lambda is active
        run: |
          STATE=$(aws lambda get-function \
            --function-name iam-guardrail-enforcer-${{ env.ENVIRONMENT }} \
            --query 'Configuration.State' --output text)
          echo "Lambda state: $STATE"
          [ "$STATE" = "Active" ] || exit 1

      - name: Verify EventBridge rules are enabled
        run: |
          for RULE in create-role attach-policy put-policy; do
            STATE=$(aws events describe-rule \
              --name iam-guardrail-$RULE-${{ env.ENVIRONMENT }} \
              --query 'State' --output text)
            echo "Rule iam-guardrail-$RULE: $STATE"
            [ "$STATE" = "ENABLED" ] || exit 1
          done

      - name: Notify Teams on successful deployment
        if: success()
        run: |
          curl -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "✅ IAM Guardrail deployed successfully to ${{ env.ENVIRONMENT }}"
            }'

      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "🔴 IAM Guardrail deployment FAILED in ${{ env.ENVIRONMENT }} - immediate attention required"
            }'